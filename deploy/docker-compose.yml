services:
  spectra-api:
    build: {context: .., dockerfile: deploy/Dockerfile}
    ports: ["8000:8000"]
    environment:
      SPECTRA_CHECKPOINT: /models/model.pt
      SPECTRA_MODE: "E"
      SPECTRA_DEVICE: "cpu"
      SPECTRA_ESM_CKPT: "facebook/esm2_t6_8M_UR50D"
    volumes:
      - ../models:/models:ro
