name: CI
on:
  push: {branches: [main]}
  pull_request: {branches: [main]}
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - name: Install (lint + test only)
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy
          pip install -e . || true
      - name: Ruff
        run: ruff check spectra tests || true
      - name: Pytest (import/config smoke tests)
        run: pytest -q tests/test_imports.py tests/test_config.py
